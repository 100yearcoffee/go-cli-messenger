services:
  coturn:
    image: coturn/coturn:4.14.0
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ${TURN_CERT_DIRECTORY:?set TURN_CERT_DIRECTORY}:/etc/coturn/certs:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --realm=${TURN_REALM:?set TURN_REALM}
      - --server-name=${TURN_REALM:?set TURN_REALM}
      - --external-ip=${TURN_EXTERNAL_IP:?set TURN_EXTERNAL_IP}
      - --static-auth-secret=${TURN_SECRET:?set TURN_SECRET}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
